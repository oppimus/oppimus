<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPPIMUS — Client Intake Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #05050a; --deep: #09090f; --card: #111120;
  --gold: #c4a05c; --gold2: #e8c97a; --gold-dim: rgba(196,160,92,0.1);
  --white: #f8f6f1; --muted: rgba(248,246,241,0.48);
  --border: rgba(255,255,255,0.07); --error: #f87171; --success: #4ade80;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif; background: var(--void); color: var(--white);
  -webkit-font-smoothing: antialiased; overflow-x: hidden; line-height: 1.6;
}

/* Ambient Visuals */
.glow { position: fixed; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none; }
.glow-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(196,160,92,0.08) 0%, transparent 70%); top: -10%; right: -5%; }

/* Layout */
.page-wrap { max-width: 800px; margin: 0 auto; padding: 60px 20px; position: relative; z-index: 2; }
.header { text-align: center; margin-bottom: 50px; }
.logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; letter-spacing: 4px; color: var(--white); margin-bottom: 8px; }
.logo span { color: var(--gold); }

/* Progress Bar */
.progress-container { margin-bottom: 40px; background: var(--deep); height: 6px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.progress-bar { width: 25%; height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

/* Form Card */
.form-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative; }
.form-step { display: none; animation: fadeIn 0.4s ease forwards; }
.form-step.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Inputs & UI */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.full { grid-column: 1 / -1; }
label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
input, select, textarea {
  width: 100%; background: var(--deep); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 18px; color: var(--white); font-family: inherit; transition: all 0.2s; outline: none;
}
input:focus { border-color: var(--gold); box-shadow: 0 0 0 4px var(--gold-dim); }
.hidden-honeypot { display: none; }

/* Upload Zone */
.upload-zone {
  border: 2px dashed var(--border); border-radius: 16px; padding: 40px 20px; text-align: center;
  transition: all 0.3s; cursor: pointer; background: rgba(255,255,255,0.02);
}
.upload-zone.dragover { border-color: var(--gold); background: var(--gold-dim); transform: scale(1.01); }

/* Buttons */
.btn-row { display: flex; justify-content: space-between; margin-top: 35px; gap: 15px; }
.btn {
  padding: 14px 28px; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: inherit;
  transition: all 0.3s; border: none; display: flex; align-items: center; gap: 8px;
}
.btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--void); box-shadow: 0 10px 20px rgba(196,160,92,0.2); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(196,160,92,0.3); }
.btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* Success */
.success-card { text-align: center; display: none; }
.check-icon { width: 60px; height: 60px; background: var(--success); color: var(--void); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.5rem; }
</style>
</head>
<body>

<div class="glow glow-1"></div>

<div class="page-wrap">
  <div class="header">
    <div class="logo">OPPIMUS<span>.</span></div>
    <p style="color: var(--muted); font-size: 0.9rem;">Elite Tax Strategy & Precision Filing</p>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="form-card">
    <form id="eliteIntakeForm">
      <input type="text" name="_honeypot" class="hidden-honeypot">

      <div class="form-step active" id="step1">
        <h2 style="margin-bottom: 25px; font-family: 'Playfair Display';">Account <em style="color: var(--gold);">Identity</em></h2>
        <div class="form-grid">
          <div class="form-group"><label>First Name</label><input type="text" name="firstName" id="firstName" required></div>
          <div class="form-group"><label>Last Name</label><input type="text" name="lastName" id="lastName" required></div>
          <div class="form-group full"><label>Email Address</label><input type="email" name="email" id="email" required></div>
        </div>
        <div class="btn-row"><div style="flex:1"></div><button type="button" class="btn btn-primary" onclick="nextStep(2)">Continue</button></div>
      </div>

      <div class="form-step" id="step2">
        <h2 style="margin-bottom: 25px; font-family: 'Playfair Display';">Tax <em style="color: var(--gold);">Context</em></h2>
        <div class="form-grid">
          <div class="form-group full">
            <label>Primary Service</label>
            <select name="service" id="service">
              <option value="Essential">Essential — Simple Filing ($199)</option>
              <option value="Professional">Professional — Itemized ($349)</option>
              <option value="Premium">Premium — Business/Complex ($599+)</option>
            </select>
          </div>
          <div class="form-group full"><label>Additional Details</label><textarea name="details" id="details" placeholder="Anything else we should know?"></textarea></div>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-secondary" onclick="prevStep(1)">Back</button>
          <button type="button" class="btn btn-primary" onclick="nextStep(3)">Continue</button>
        </div>
      </div>

      <div class="form-step" id="step3">
        <h2 style="margin-bottom: 25px; font-family: 'Playfair Display';">Secure <em style="color: var(--gold);">Upload</em></h2>
        <div class="upload-zone" id="dropZone">
          <p style="font-weight: 500;">Drag & Drop Documents</p>
          <p style="font-size: 0.8rem; color: var(--muted);">W-2, 1099, or prior returns (Max 10MB per file)</p>
          <input type="file" id="fileInput" multiple style="display: none;">
        </div>
        <div id="filePreview" style="margin-top: 15px; font-size: 0.85rem; color: var(--gold);"></div>
        <div class="btn-row">
          <button type="button" class="btn btn-secondary" onclick="prevStep(2)">Back</button>
          <button type="button" class="btn btn-primary" onclick="nextStep(4)">Review</button>
        </div>
      </div>

      <div class="form-step" id="step4">
        <h2 style="margin-bottom: 25px; font-family: 'Playfair Display';">Final <em style="color: var(--gold);">Submission</em></h2>
        <div id="summary" style="background: var(--deep); padding: 20px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem;"></div>
        <div class="btn-row">
          <button type="button" class="btn btn-secondary" onclick="prevStep(3)">Back</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Submit Securely</button>
        </div>
      </div>
    </form>

    <div class="success-card" id="successMsg">
      <div class="check-icon">✓</div>
      <h2 style="font-family: 'Playfair Display'; margin-bottom: 10px;">Submission Received</h2>
      <p style="color: var(--muted);">An OPPIMUS specialist will contact you within 24 hours.</p>
    </div>
  </div>
</div>

<script>
let currentStep = 1;
let files = [];

function updateUI() {
  document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
  document.getElementById(`step${currentStep}`).classList.add('active');
  document.getElementById('progressBar').style.width = `${(currentStep / 4) * 100}%`;
  if(currentStep === 4) buildSummary();
}

function nextStep(s) { currentStep = s; updateUI(); }
function prevStep(s) { currentStep = s; updateUI(); }

const dropZone = document.getElementById('dropZone');
dropZone.onclick = () => document.getElementById('fileInput').click();
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
dropZone.ondragleave = () => dropZone.classList.remove('dragover');
dropZone.ondrop = (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
};

document.getElementById('fileInput').onchange = (e) => handleFiles(e.target.files);

function handleFiles(newFiles) {
  for (let f of newFiles) {
    if (f.size > 10 * 1024 * 1024) continue;
    files.push(f);
  }
  document.getElementById('filePreview').innerText = `${files.length} file(s) attached`;
}

function buildSummary() {
  const data = new FormData(document.getElementById('eliteIntakeForm'));
  document.getElementById('summary').innerHTML = `
    <p><strong>Name:</strong> ${data.get('firstName')} ${data.get('lastName')}</p>
    <p><strong>Service:</strong> ${data.get('service')}</p>
    <p><strong>Files:</strong> ${files.length} documents</p>
  `;
}

document.getElementById('eliteIntakeForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerText = 'Encrypting...';

  const formData = new FormData(e.target);
  if (formData.get('_honeypot')) return;

  formData.append('access_key', 'e2adcc07-2326-4b25-9eac-6e3cbb37691d');
  formData.append('subject', `Elite Intake: ${formData.get('firstName')} ${formData.get('lastName')}`);

  try {
    const response = await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      body: formData
    });
    if (response.ok) {
      document.getElementById('eliteIntakeForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    }
  } catch (err) {
    alert("Submission error. Please try again.");
    btn.disabled = false;
  }
};

window.onload = () => {
  const inputs = ['firstName', 'lastName', 'email', 'details'];
  inputs.forEach(id => {
    const el = document.getElementById(id);
    el.value = sessionStorage.getItem(id) || '';
    el.oninput = () => sessionStorage.setItem(id, el.value);
  });
};
</script>
</body>
</html>
